name: publish release

on:
    workflow_dispatch:
        inputs:
            part:
                description: "Semver part to bump (major, minor, patch)"
                type: choice
                required: true
                default: "patch"
                options: ["major", "minor", "patch"]
            dry-run:
                description: "Dry run"
                type: boolean
                required: true
                default: false

jobs:
    bump:
        name: Bump version
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        outputs:
            VERSION: ${{ steps.get-version.outputs.VERSION }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Get tags
              run: git fetch --tags origin

            - name: Configure git for github-actions[bot]
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Install dependencies
              run: uv sync --frozen --dev

            - name: Bump version
              run: uv run bump-my-version bump ${{ inputs.part }}

            - name: Update uv.lock after version bump
              run: |
                  uv lock
                  git add uv.lock
                  if ! git diff --cached --quiet; then
                    git commit --amend --no-edit
                    git tag -f "$(git describe --tags --abbrev=0)"
                  fi

            - name: Get version
              id: get-version
              run: |
                  version="$(git describe --tags)"
                  version="${version:1}"
                  echo "VERSION=$version" >> $GITHUB_OUTPUT

            - name: Commit and push with tags
              if: ${{ inputs.dry-run == false }}
              run: |
                  git pull --rebase origin main
                  git push --follow-tags

            - name: Create GitHub Release
              if: ${{ inputs.dry-run == false }}
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.get-version.outputs.VERSION }}
                  name: Release v${{ steps.get-version.outputs.VERSION }}
                  generate_release_notes: true
                  draft: false
                  prerelease: false

    update-chart:
        name: Update catalog Helm chart
        runs-on: ubuntu-latest
        needs: bump
        if: ${{ inputs.dry-run == false }}
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout cave-helm-charts repo
              uses: actions/checkout@v4
              with:
                  repository: CAVEconnectome/cave-helm-charts
                  token: ${{ secrets.HELM_CHART_UPDATE_TOKEN }}
                  path: helm-charts

            - name: Update Chart.yaml appVersion
              run: |
                  cd helm-charts
                  chart_file="charts/catalog/Chart.yaml"
                  sed -i "s/^appVersion: .*/appVersion: \"${{ needs.bump.outputs.VERSION }}\"/" $chart_file
                  sed -i "s/^version: .*/version: ${{ needs.bump.outputs.VERSION }}/" $chart_file
                  echo "Updated chart to v${{ needs.bump.outputs.VERSION }}"

            - name: Commit and push changes
              run: |
                  cd helm-charts
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add charts/catalog/Chart.yaml
                  git commit -m "Update catalog to v${{ needs.bump.outputs.VERSION }}

                  - Update appVersion to ${{ needs.bump.outputs.VERSION }}
                  - Update chart version to ${{ needs.bump.outputs.VERSION }}

                  Auto-generated by catalog release workflow"
                  git push
