name: checks

on:
    push:
        branches: [main]
    pull_request:

jobs:
    checks:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Install just
              uses: extractions/setup-just@v2

            - name: Run checks
              run: just checks
